name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-ci:
    name: Quality / Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20.12.x
          - 22.x

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Provision Chromium
        run: npx playwright install --with-deps chromium

      - name: Run CI quality gate
        run: npm run quality:ci

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: quality-ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Provision Chromium
        run: npx playwright install --with-deps chromium

      - name: Run coverage
        run: npm run test:coverage

  headed-parity:
    name: Headed Parity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Provision Chromium
        run: npx playwright install --with-deps chromium

      - name: Run headed parity gate
        run: xvfb-run -a npm run test:parity:headed

  build:
    name: Build / Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20.12.x
          - 22.x
          - 24.x

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Run production typecheck
        run: npm run typecheck:prod

      - name: Verify silent npm pack output
        run: npm run -s pack:check:silent

      - name: Verify global install dry run
        run: npm run -s global-install:dry-run

      - name: Verify packaged global install smoke
        run: npm run -s global-install:smoke

      - name: Pack tarball artifact
        run: npm pack

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-node-${{ matrix.node-version }}
          path: ui-test-*.tgz
          if-no-files-found: error

  consumer-smoke:
    name: Consumer Smoke
    runs-on: ubuntu-latest
    needs:
      - build
      - quality-ci
      - headed-parity
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Provision Chromium
        run: npx playwright install --with-deps chromium

      - name: Run consumer smoke test
        run: npm run test:smoke
