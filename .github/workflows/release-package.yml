name: Release Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-package-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Assert release tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm run release:assert-tag

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run release quality gate
        run: npm run quality:release

      - name: Run headed parity gate
        run: xvfb-run -a npm run test:parity:headed

      - name: Pack npm tarball
        run: npm pack

      - name: Upload npm tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-package-release
          path: ui-test-*.tgz
          if-no-files-found: error
